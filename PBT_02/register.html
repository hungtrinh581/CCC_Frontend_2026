<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tai khoan</title>
</head>
<body><main><h1>Đăng ký ShopTLU</h1><form action="#" method="POST">
<fieldset><legend>Thông tin ca nhan</legend>
<label for="name">Họ tên</label><input id="name" name="name" type="text" required minlength="2" maxlength="50" placeholder="Nguyen Van A">
<label for="email">Email</label><input id="email" name="email" type="email" required placeholder="you@email.com">
<label for="phone">Số điện thoại</label><input id="phone" name="phone" type="tel" pattern="[0-9]{10}" placeholder="0901234567">
<label for="dob">Ngày sinh</label><input id="dob" name="dob" type="date" max="2026-05-31" placeholder="Ngày sinh">
</fieldset><fieldset><legend>Tài khoản</legend>
<label for="username">Username</label><input id="username" name="username" type="text" pattern="[A-Za-z0-9_]{3,20}" required placeholder="hung_trinh">
<label for="password">Password</label><input id="password" name="password" type="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required placeholder="Abc12345">
<label for="confirm">Xác nhận password</label><input id="confirm" name="confirm" type="password" minlength="8" pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" required placeholder="Nhập lại mật khẩu">
</fieldset><fieldset><legend>Thông tin giao hang</legend>
<label for="city">Thành phố</label><select id="city" name="city"><option>Hà Nội</option><option>TP.HCM</option><option>Đà Nẵng</option><option>Cần Thơ</option><option>Hải Phòng</option></select>
<label for="district">Quận/Huyện</label><select id="district" name="district"><option>Thanh Xuân</option><option>Cầu Giấy</option><option>Hoàn Kiếm</option></select>
<label for="address">Địa chỉ</label><textarea id="address" name="address" rows="3" placeholder="Số nhà, đường..."></textarea>
<label><input type="radio" name="gender" value="male"> Nam</label><label><input type="radio" name="gender" value="female"> Nữ</label><label><input type="radio" name="gender" value="other"> Khác</label>
</fieldset><label><input type="checkbox" required> Tôi đồng ý điều khoản</label><button type="submit">Đăng ký</button><button type="reset">Nhập lại</button></form></main></body></html>
