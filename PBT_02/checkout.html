<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
</head>
<body><main><h1>Đặt hàng</h1><form action="#" method="post"><section><h2>Giỏ hàng</h2><table><thead><tr><th>STT</th><th>Sản phẩm</th><th>Đơn giá</th><th>Số lượng</th><th>Thành tiền</th></tr></thead><tbody><tr><td>1</td><td>iPhone</td><td>25.990.000d</td><td>1</td><td>25.990.000d</td></tr><tr><td>2</td><td>AirPods</td><td>6.990.000d</td><td>2</td><td>13.980.000d</td></tr><tr><td>3</td><td>Case</td><td>490.000d</td><td>1</td><td>490.000d</td></tr></tbody><tfoot><tr><td colspan="4">Tổng cộng</td><td>40.460.000d</td></tr></tfoot></table></section><fieldset><legend>Thanh toán</legend><label><input type="radio" name="pay" value="cod" checked> COD</label><label><input type="radio" name="pay" value="bank"> Chuyển khoản</label><label><input type="radio" name="pay" value="wallet"> Ví điện tử</label><label for="coupon">Mã giảm giá</label><input id="coupon" name="coupon" type="text" pattern="SALE[0-9]{4}" placeholder="SALE2026"><label for="note">Ghi chú</label><textarea id="note" name="note"></textarea></fieldset><fieldset><legend>Giao hàng</legend><input list="products" placeholder="Tìm sản phẩm"><datalist id="products"><option value="iPhone 16"></option><option value="AirPods Pro"></option></datalist><label for="delivery">Ngày giao</label><input id="delivery" type="date" min="2026-06-01"><label for="slot">Khung giờ</label><select id="slot"><option>Sáng 8-12h</option><option>Chiều 14-18h</option><option>Tối 18-21h</option></select><label for="days">Số ngày giao</label><input id="days" type="range" min="1" max="7" step="1"><output>40.460.000d</output><meter value="70" min="0" max="100">70%</meter></fieldset><button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button></form></main></body></html>
