<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validation Test</title>
</head>
<body><main><h1>Validation Test</h1><form action="#" method="post">
<label>Bat buoc <input type="text" required value=""></label>
<label>Email <input type="email" value="abc"></label>
<label>So 1-10 <input type="number" min="1" max="10" value="15"></label>
<label>10 chu so <input type="text" pattern="[0-9]{10}" value="abc123"></label>
<label>Mật khẩu <input type="password" minlength="8" value="123"></label>
<button type="submit">Submit</button></form></main></body></html>
