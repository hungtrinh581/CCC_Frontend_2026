<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug HTML da sua</title>
</head>
<body>
  <header>
    <h1>Welcome to ShopTLU</h1>
    <nav aria-label="Điều hướng chính"><a href="/home">Trang chủ</a><a href="/products">Sản phẩm</a></nav>
  </header>
  <main>
    <section aria-labelledby="hot-title">
      <h2 id="hot-title">Sản phẩm hot</h2>
      <figure><img src="iphone.jpg" alt="iPhone 16 Pro"><figcaption>iPhone 16 Pro</figcaption></figure>
      <p>Giá: <strong>25.990.000d</strong></p>
    </section>
    <section aria-labelledby="info-title">
      <h2 id="info-title">Thông tin</h2>
      <table><thead><tr><th>Ten</th><th>Gia</th></tr></thead><tbody><tr><td>iPhone</td><td>25tr</td></tr></tbody></table>
    </section>
  </main>
  <aside><p>Sidebar content</p></aside>
  <footer><p>Copyright 2026</p></footer>
</body>
</html>
