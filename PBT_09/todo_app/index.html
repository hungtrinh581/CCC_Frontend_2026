<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">

<body><main><h1>Todo App</h1><form id="todoForm"><input id="todoInput" placeholder="Việc cần làm"><button type="submit">Thêm</button></form><p id="count"></p><div><button type="button" data-filter="all">All</button><button type="button" data-filter="active">Active</button><button type="button" data-filter="completed">Completed</button><button type="button" id="clearCompleted">Clear completed</button></div><ul id="todoList"></ul></main><script src="app.js"></script></body></html>
